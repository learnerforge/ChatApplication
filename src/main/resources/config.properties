# ── Server ──────────────────────────────
server.port=5000
server.host=0.0.0.0
server.max_clients=100
server.backlog=50

# ── HTTPS / TLS (optional, for cloudflared) ──
# Set a keystore path to enable TLS.
# Generate a self-signed cert for cloudflared:
#   keytool -genkey -alias chat -keyalg RSA -keystore chatapp.jks -keysize 2048 -validity 365
server.ssl.enabled=false
server.ssl.keystore=chatapp.jks
server.ssl.keystore.password=changeit
server.ssl.port=5443

# ── Database (SQLite by default) ────────
database.url=jdbc:sqlite:chatapp.db

# ── Chat history ────────────────────────
history.limit=50
